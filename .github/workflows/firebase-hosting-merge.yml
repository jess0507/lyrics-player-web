# 推送到 master 時，建置並部署到 Firebase Hosting 正式站。
name: Deploy to Firebase Hosting on merge

on:
  push:
    branches: [master]
    paths-ignore:
      - "*.md"
      - "_config.yml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

concurrency:
  group: firebase-hosting-live
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SEEK_PLAYER_F724E }}
          channelId: live
          projectId: seek-player-f724e
